<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bogorian AI Chat</title>

<style>
body{
    margin:0;
    font-family:"Segoe UI",Arial,sans-serif;
    background:#ffffff;
}

#chat-box{
    width:100%;
    height:100vh;
    display:flex;
    flex-direction:column;
    background:#ffffff;
}

#chat-header{
    background:#16a34a;
    color:white;
    padding:14px;
    text-align:center;
    font-weight:600;
    font-size:16px;
}

#chat-body{
    flex:1;
    overflow-y:auto;
    padding:12px;
    background:#f8fafc;
}

#chat-input{
    display:flex;
    border-top:1px solid #e5e7eb;
    background:#ffffff;
}

#chat-input input{
    flex:1;
    border:none;
    outline:none;
    padding:12px;
    font-size:14px;
    color:#111;
}

#chat-input button{
    border:none;
    background:#16a34a;
    color:white;
    padding:12px 18px;
    cursor:pointer;
    font-weight:600;
}

.msg-user{
    background:#16a34a;
    color:white;
    padding:10px;
    border-radius:10px;
    margin:8px 0;
    max-width:80%;
    margin-left:auto;
    text-align:right;
}

.msg-ai{
    background:#e5e7eb;
    color:#111;
    padding:10px;
    border-radius:10px;
    margin:8px 0;
    max-width:80%;
}

.typing{
    opacity:.7;
    font-style:italic;
}
</style>

</head>

<body>

<div id="chat-box">

```
<div id="chat-header">
    Bogorian AI Assistant
</div>

<div id="chat-body">
    <div class="msg-ai">
        Hi 👋 Ask me anything about Bogorian Shop.
    </div>
</div>

<div id="chat-input">
    <input id="userInput" type="text" placeholder="Type message...">
    <button id="sendBtn">Send</button>
</div>
```

</div>

<script>
const API_URL = "https://api.dify.ai/v1";
const API_KEY = "app-gDfDvsZgBQ7f9bTNhVnFgvxA";

const chatBody = document.getElementById("chat-body");
const input = document.getElementById("userInput");
const sendBtn = document.getElementById("sendBtn");

let conversation_id = null;
let isLoading = false;

function addMessage(text,type){
    const div = document.createElement("div");
    div.className = type === "user" ? "msg-user" : "msg-ai";
    div.innerText = text;
    chatBody.appendChild(div);
    chatBody.scrollTop = chatBody.scrollHeight;
}

function showTyping(){
    const div = document.createElement("div");
    div.id = "typing";
    div.className = "msg-ai typing";
    div.innerText = "AI is typing...";
    chatBody.appendChild(div);
    chatBody.scrollTop = chatBody.scrollHeight;
}

function removeTyping(){
    const el = document.getElementById("typing");
    if(el) el.remove();
}

async function sendMessage(){

    const message = input.value.trim();

    if(!message || isLoading){
        return;
    }

    isLoading = true;

    addMessage(message,"user");

    input.value = "";

    showTyping();

    try{

        const response = await fetch(API_URL,{
            method:"POST",
            headers:{
                "Authorization":"Bearer " + API_KEY,
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                inputs:{},
                query:message,
                response_mode:"blocking",
                conversation_id:conversation_id,
                user:"bogorian-user"
            })
        });

        const data = await response.json();

        removeTyping();

        const reply =
            data.answer ||
            data.data?.answer ||
            "No response";

        if(data.conversation_id){
            conversation_id = data.conversation_id;
        }

        addMessage(reply,"ai");

    }catch(error){

        removeTyping();

        addMessage(
            "Unable to connect to AI. Please try again.",
            "ai"
        );
    }

    isLoading = false;
}

sendBtn.addEventListener("click",sendMessage);

input.addEventListener("keydown",function(e){
    if(e.key === "Enter"){
        sendMessage();
    }
});
</script>

</body>
</html>
