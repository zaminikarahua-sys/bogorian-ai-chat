<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bogorian AI Chat</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
    }

    /* Floating button */
    #chat-button {
      position: fixed;
      right: 20px;
      bottom: 20px;

      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: #2563eb;
      color: white;
      border: none;

      font-size: 24px;
      cursor: pointer;

      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      z-index: 9999;
    }

    /* Chat box */
    #chat-box {
      position: fixed;
      right: 20px;
      bottom: 90px;

      width: 350px;
      height: 500px;

      background: white;
      border-radius: 16px;

      display: none;
      flex-direction: column;

      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
      overflow: hidden;
      z-index: 9999;
    }

    #chat-header {
      background: #2563eb;
      color: white;
      padding: 12px;
      font-weight: bold;
    }

    #chat-body {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
      font-size: 14px;
    }

    #chat-input {
      display: flex;
      border-top: 1px solid #ddd;
    }

    #chat-input input {
      flex: 1;
      padding: 10px;
      border: none;
      outline: none;
    }

    #chat-input button {
      padding: 10px 15px;
      background: #2563eb;
      color: white;
      border: none;
      cursor: pointer;
    }

    .msg-user {
      text-align: right;
      margin: 6px 0;
      color: #111;
    }

    .msg-ai {
      text-align: left;
      margin: 6px 0;
      color: #2563eb;
    }
  </style>
</head>

<body>

<button id="chat-button">💬</button>

<div id="chat-box">
  <div id="chat-header">Bogorian AI Assistant</div>

  <div id="chat-body">
    <div class="msg-ai">Hi 👋 I’m Bogorian AI. Ask me anything.</div>
  </div>

  <div id="chat-input">
    <input type="text" placeholder="Type message..." />
    <button>Send</button>
  </div>
</div>

<script>
const button = document.getElementById("chat-button");
const box = document.getElementById("chat-box");
const body = document.getElementById("chat-body");
const input = document.querySelector("#chat-input input");
const sendBtn = document.querySelector("#chat-input button");

const API_URL = "https://api.dify.ai/v1/chat-messages";
const API_KEY = "app-7Y64cLQAqCwZBkikKVZyVgBQ";

let conversation_id = null;

// open/close chat
button.onclick = () => {
  box.style.display = box.style.display === "flex" ? "none" : "flex";
};

// send message
async function sendMessage() {
  const message = input.value.trim();
  if (!message) return;

  // show user message
  body.innerHTML += `<div class="msg-user">You: ${message}</div>`;
  input.value = "";
  body.scrollTop = body.scrollHeight;

  try {
    const res = await fetch(API_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${API_KEY}`
      },
      body: JSON.stringify({
        inputs: {},
        query: message,
        response_mode: "blocking",
        conversation_id: conversation_id,
        user: "bogorian-user"
      })
    });

    const data = await res.json();

    conversation_id = data.conversation_id;

    body.innerHTML += `<div class="msg-ai">Bogorian AI: ${data.answer}</div>`;
    body.scrollTop = body.scrollHeight;

  } catch (err) {
    body.innerHTML += `<div class="msg-ai">Error: Cannot connect to AI</div>`;
  }
}

sendBtn.onclick = sendMessage;

input.addEventListener("keypress", (e) => {
  if (e.key === "Enter") sendMessage();
});
</script>

</body>
</html>
