<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bogorian AI Chat</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
    }

    #chat-button {
      position: fixed;
      right: 20px;
      bottom: 20px;

      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: #2563eb;
      color: white;
      border: none;

      font-size: 24px;
      cursor: pointer;

      z-index: 9999;
    }

    #chat-box {
      position: fixed;
      right: 20px;
      bottom: 90px;

      width: 340px;
      height: 500px;

      background: rgba(255,255,255,0.95);
      border-radius: 16px;

      display: none;
      flex-direction: column;

      overflow: hidden;
      z-index: 9999;
    }

    #chat-header {
      background: #2563eb;
      color: white;
      padding: 12px;
      font-weight: bold;
    }

    #chat-body {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
      font-size: 14px;
    }

    #chat-input {
      display: flex;
      border-top: 1px solid #ddd;
    }

    #chat-input input {
      flex: 1;
      padding: 10px;
      border: none;
      outline: none;
    }

    #chat-input button {
      padding: 10px 15px;
      background: #2563eb;
      color: white;
      border: none;
      cursor: pointer;
    }

    .msg-user {
      text-align: right;
      margin: 6px 0;
      padding: 8px 10px;
      background: #2563eb;
      color: white;
      border-radius: 12px;
      max-width: 80%;
      margin-left: auto;
    }

    .msg-ai {
      text-align: left;
      margin: 6px 0;
      padding: 8px 10px;
      background: #f1f5f9;
      color: #111;
      border-radius: 12px;
      max-width: 80%;
    }

    .typing {
      font-style: italic;
      opacity: 0.6;
    }
  </style>
</head>

<body>

<button id="chat-button">💬</button>

<div id="chat-box">
  <div id="chat-header">Bogorian AI Assistant</div>

  <div id="chat-body">
    <div class="msg-ai">Hi 👋 Ask me anything about Bogorian Shop.</div>
  </div>

  <div id="chat-input">
    <input type="text" placeholder="Type message..." />
    <button>Send</button>
  </div>
</div>

<script>
const button = document.getElementById("chat-button");
const box = document.getElementById("chat-box");
const body = document.getElementById("chat-body");
const input = document.querySelector("#chat-input input");
const sendBtn = document.querySelector("#chat-input button");

const API_URL = "https://api.dify.ai/v1/chat-messages";
const API_KEY = "app-gDfDvsZgBQ7f9bTNhVnFgvxA";

let conversation_id = null;
let isLoading = false;

/* toggle chat */
button.onclick = () => {
  box.style.display = box.style.display === "flex" ? "none" : "flex";
  if (box.style.display === "flex") box.style.display = "flex";
};

/* safe message render */
function addMessage(text, type) {
  const div = document.createElement("div");
  div.className = type === "user" ? "msg-user" : "msg-ai";
  div.innerText = text; // IMPORTANT: avoids weird HTML bugs
  body.appendChild(div);
  body.scrollTop = body.scrollHeight;
}

/* typing */
function showTyping() {
  const div = document.createElement("div");
  div.id = "typing";
  div.className = "msg-ai typing";
  div.innerText = "Bogorian AI is typing...";
  body.appendChild(div);
  body.scrollTop = body.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById("typing");
  if (el) el.remove();
}

/* send message */
async function sendMessage() {
  const message = input.value.trim();
  if (!message || isLoading) return;

  isLoading = true;

  addMessage(message, "user");
  input.value = "";

  showTyping();

  try {
    const res = await fetch(API_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + API_KEY
      },
      body: JSON.stringify({
        inputs: {},
        query: message,
        response_mode: "blocking",
        conversation_id: conversation_id || null,
        user: "bogorian-user"
      })
    });

    const data = await res.json();

    removeTyping();

    /* CLEAN DIFY RESPONSE FIX */
    const reply =
      data.answer ||
      data.data?.answer ||
      data.data?.outputs?.text ||
      "No response";

    conversation_id = data.conversation_id || conversation_id;

    addMessage(reply, "ai");

  } catch (err) {
    removeTyping();
    addMessage("Connection error", "ai");
  }

  isLoading = false;
}

/* events */
sendBtn.onclick = sendMessage;

input.addEventListener("keydown", (e) => {
  if (e.key === "Enter") sendMessage();
});
</script>

</body>
</html>
