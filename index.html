<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bogorian AI Chat</title>

  <style>
    /* =========================
       GLOBAL
    ========================== */
    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background: #f8fafc;
    }

    /* =========================
       FLOAT BUTTON
    ========================== */
    #chat-button {
      position: fixed;
      right: 20px;
      bottom: 20px;

      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: #16a34a; /* green */
      color: white;
      border: none;

      font-size: 24px;
      cursor: pointer;

      z-index: 999999;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    /* =========================
       CHAT BOX (NORMAL STYLE)
    ========================== */
    #chat-box {
      position: fixed;
      right: 20px;
      bottom: 90px;

      width: 340px;
      height: 500px;

      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 14px;

      display: flex;
      flex-direction: column;

      overflow: hidden;
      z-index: 999999;
      box-shadow: 0 20px 50px rgba(0,0,0,0.15);
    }

    /* HEADER */
    #chat-header {
      background: #16a34a;
      color: white;
      padding: 12px;
      font-weight: 600;
      text-align: center;
    }

    /* CHAT BODY */
    #chat-body {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
      font-size: 14px;
      color: #111; /* BLACK TEXT */
      background: #f9fafb;
    }

    /* INPUT AREA */
    #chat-input {
      display: flex;
      border-top: 1px solid #e5e7eb;
      background: white;
    }

    #chat-input input {
      flex: 1;
      padding: 10px;
      border: none;
      outline: none;
      font-size: 14px;
      font-family: inherit;
      color: #111;
    }

    #chat-input button {
      padding: 10px 15px;
      background: #16a34a;
      color: white;
      border: none;
      cursor: pointer;
      font-weight: 600;
    }

    /* =========================
       MESSAGES
    ========================== */
    .msg-user {
      margin: 6px 0;
      padding: 8px 10px;
      background: #16a34a;
      color: white;
      border-radius: 10px;
      max-width: 80%;
      margin-left: auto;
      text-align: right;
      font-family: inherit;
    }

    .msg-ai {
      margin: 6px 0;
      padding: 8px 10px;
      background: #e5e7eb;
      color: #111;
      border-radius: 10px;
      max-width: 80%;
      font-family: inherit;
    }

    .typing {
      opacity: 0.6;
      font-style: italic;
    }
  </style>
</head>

<body>

  <!-- FLOAT BUTTON -->
<button id="chat-button">💬</button>

<!-- CHAT WINDOW -->
<div id="chat-box">
  <div id="chat-header">Bogorian AI Assistant</div>

  <div id="chat-body">
    <div class="msg-ai">Hi 👋 Ask me anything about Bogorian Shop.</div>
  </div>

  <div id="chat-input">
    <input type="text" placeholder="Type message..." />
    <button>Send</button>
  </div>
</div>

<script>
/* =========================
   CONFIG
========================= */
const API_URL = "https://api.dify.ai/v1/chat-messages";
const API_KEY = "app-gDfDvsZgBQ7f9bTNhVnFgvxA";

/* =========================
   ELEMENTS
========================= */
const button = document.getElementById("chat-button");
const box = document.getElementById("chat-box");
const body = document.getElementById("chat-body");
const input = document.querySelector("#chat-input input");
const sendBtn = document.querySelector("#chat-input button");

let conversation_id = null;
let isLoading = false;

/* =========================
   TOGGLE CHAT
========================= */
button.onclick = () => {
  box.style.display = box.style.display === "flex" ? "none" : "flex";
};

/* =========================
   ADD MESSAGE
========================= */
function addMessage(text, type) {
  const div = document.createElement("div");
  div.className = type === "user" ? "msg-user" : "msg-ai";
  div.innerText = text;
  body.appendChild(div);
  body.scrollTop = body.scrollHeight;
}

/* =========================
   TYPING
========================= */
function showTyping() {
  const div = document.createElement("div");
  div.id = "typing";
  div.className = "msg-ai typing";
  div.innerText = "AI is typing...";
  body.appendChild(div);
  body.scrollTop = body.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById("typing");
  if (el) el.remove();
}

/* =========================
   SEND MESSAGE
========================= */
async function sendMessage() {
  const message = input.value.trim();
  if (!message || isLoading) return;

  isLoading = true;

  addMessage(message, "user");
  input.value = "";

  showTyping();

  try {
    const res = await fetch(API_URL, {
      method: "POST",
      headers: {
        "Authorization": "Bearer " + API_KEY,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        inputs: {},
        query: message,
        response_mode: "blocking",
        conversation_id: conversation_id || null,
        user: "bogorian-user"
      })
    });

    const data = await res.json();

    removeTyping();

    const reply =
      data.answer ||
      data.data?.answer ||
      data.data?.outputs?.text ||
      "No response";

    conversation_id = data.conversation_id || conversation_id;

    addMessage(reply, "ai");

  } catch (err) {
    removeTyping();
    addMessage("Connection error", "ai");
  }

  isLoading = false;
}

/* =========================
   EVENTS
========================= */
sendBtn.onclick = sendMessage;

input.addEventListener("keydown", (e) => {
  if (e.key === "Enter") sendMessage();
});
</script>

</body>
</html>
